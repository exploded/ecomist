{{template "base" .}}

{{define "content"}}
<div class="login-hero" style="min-height:auto;padding-top:6vh">
  <svg class="login-mark" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8 7.5 5 10.6 5 14.5A7 7 0 0 0 19 14.5C19 10.6 16 7.5 12 2Z" fill="currentColor" opacity=".92"/><circle cx="12" cy="15" r="2.6" fill="#f7faf9"/></svg>
  <h1 class="login-title">Ecomist</h1>
  <p class="login-sub">Run sheets, without the paper.</p>

  <form method="post" action="/login" class="card" style="width:min(94vw,380px);text-align:left">
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    {{with .Extra.Error}}
    <div class="access-note" style="background:var(--red-soft);border-color:#e8b5b1;margin-top:0">
      <span>{{.}}</span>
    </div>
    {{end}}
    <div class="field">
      <label>Email</label>
      <input class="input" type="email" name="email" value="{{.Extra.Email}}" placeholder="you@ecomist.com.au"
             autocomplete="email" required autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input class="input" type="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn-block">Sign in</button>
    {{if .Extra.OfferResend}}
    <button type="submit" class="btn btn-ghost btn-block" style="margin-top:8px"
            formaction="/resend-verification">Send the confirmation email again</button>
    {{end}}
  </form>

  <p class="small muted" style="margin-top:14px">
    New here? <a href="/register" style="color:var(--pine-700);font-weight:650">Create an account</a>
  </p>
  {{if .Extra.DevMode}}
  <a href="/dev/login" class="btn btn-ghost btn-sm" style="margin-top:10px">Dev login (local only)</a>
  {{end}}
</div>
{{end}}
