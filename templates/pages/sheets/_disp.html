{{define "sheets/_disp"}}
{{$d := .D}}
{{$sheetID := .SheetID}}
{{$stopID := .StopID}}
<div class="tick-row {{if $d.TickID.Valid}}is-ticked{{end}}" id="sd-{{$d.ID}}">
  <button class="tick-hit" hx-disabled-elt="this"
    {{if $d.TickID.Valid}}
    hx-delete="/sheets/{{$sheetID}}/ticks/{{$d.ID}}"
    {{else}}
    hx-post="/sheets/{{$sheetID}}/ticks/{{$d.ID}}"
    {{end}}
    hx-target="#sd-{{$d.ID}}" hx-swap="outerHTML">
    <span class="tick-box"><svg viewBox="0 0 24 24"><path d="m5 13 5 5 9-11"/></svg></span>
    <span class="tick-main">
      <span class="tick-loc">{{if $d.SeqLabel}}{{$d.SeqLabel}}. {{end}}{{$d.Location}}</span>
      <span class="tick-meta">
        <span class="badge badge-pine">{{$d.ModelName}}</span>
        {{if $d.FragranceName.Valid}}<span class="badge">{{$d.FragranceName.String}}</span>
        {{else if $d.FragranceNote}}<span class="badge badge-warn">{{$d.FragranceNote}}</span>{{end}}
        {{if gt $d.Quantity 1}}<span class="badge">&times;{{$d.Quantity}}</span>{{end}}
        {{if $d.ServiceIntervalDays.Valid}}<span class="badge">{{$d.ServiceIntervalDays.Int64}}d</span>{{end}}
        {{if $d.Notes}}<span class="badge" title="{{$d.Notes}}">&#9432; {{$d.Notes}}</span>{{end}}
        {{if $d.TickID.Valid}}<span class="tick-time">&#10003; {{localTime $d.TickedAt.String}}</span>{{end}}
      </span>
    </span>
  </button>
  {{if $d.TickID.Valid}}
  <details class="tick-note">
    <summary class="btn-icon" aria-label="{{if $d.TickNote.String}}Edit note{{else}}Add a note{{end}}" title="Note">&#9998;</summary>
    <div class="tick-note-pop">
      <input class="input autosave" name="note" value="{{$d.TickNote.String}}" placeholder="Note for this dispenser&hellip;"
        hx-patch="/sheets/{{$sheetID}}/ticks/{{$d.ID}}/note" hx-trigger="change" hx-swap="none">
    </div>
  </details>
  {{end}}
  <details class="tick-note no-print">
    <summary class="btn-icon" aria-label="Edit dispenser" title="Edit">&#9881;</summary>
    <form class="tick-note-pop card" hx-patch="/dispensers/{{$d.ID}}"
          hx-vals='{"rerender":"1"}' hx-target="#stop-groups" hx-swap="outerHTML" style="min-width:240px">
      <input type="hidden" name="sheet_id" value="{{$sheetID}}">
      <input type="hidden" name="stop_id" value="{{$stopID}}">
      <input class="input" name="location" value="{{$d.Location}}" placeholder="Location" required>
      <input class="input" name="zone_name" list="stop-zone-names" value="{{$d.ZoneLabel.String}}"
        autocomplete="off" placeholder="Zone (blank = no zone)" style="margin-top:8px">
      <button type="submit" class="btn btn-sm btn-block" style="margin-top:8px" hx-disabled-elt="this">Save</button>
    </form>
  </details>
  <div class="no-print" style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">
    <button class="btn-icon" aria-label="Move dispenser up" style="min-width:34px;min-height:28px;padding:2px"
      hx-post="/sheets/{{$sheetID}}/stops/{{$stopID}}/dispensers/{{$d.ID}}/reorder" hx-vals='{"dir":"up"}'
      hx-target="#stop-groups" hx-swap="outerHTML">&#9650;</button>
    <button class="btn-icon" aria-label="Move dispenser down" style="min-width:34px;min-height:28px;padding:2px"
      hx-post="/sheets/{{$sheetID}}/stops/{{$stopID}}/dispensers/{{$d.ID}}/reorder" hx-vals='{"dir":"down"}'
      hx-target="#stop-groups" hx-swap="outerHTML">&#9660;</button>
  </div>
</div>
{{end}}
